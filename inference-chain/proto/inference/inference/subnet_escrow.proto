syntax = "proto3";

package inference.inference;

option go_package = "github.com/productscience/inference/x/inference/types";

message SubnetEscrow {
  uint64 id = 1;
  string creator = 2;
  uint64 amount = 3;
  repeated string slots = 4;
  uint64 epoch_index = 5;
  string app_hash = 6;
  bool settled = 7;
  uint64 token_price = 8;
}

message SubnetHostEpochStats {
  string participant = 1;
  uint64 epoch_index = 2;
  uint32 missed = 3;
  uint32 invalid = 4;
  uint64 cost = 5;
  uint32 required_validations = 6;
  uint32 completed_validations = 7;
  uint32 escrow_count = 8;
}

message SubnetSettlementHostStats {
  uint32 slot_id = 1;
  uint32 missed = 2;
  uint32 invalid = 3;
  uint64 cost = 4;
  uint32 required_validations = 5;
  uint32 completed_validations = 6;
}

message SubnetSlotSignature {
  uint32 slot_id = 1;
  bytes signature = 2;
}
